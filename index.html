<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#F3EFE6" />
  <title>Despedida do Dias</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header id="hdr" class="app-header hidden"></header>

  <main id="screens">

    <!-- ENTRADA -->
    <section id="s-entrada" class="screen active">
      <div class="entrada">
        <h1 class="hero" id="entrada-titulo">Despedida do <em>Dias</em></h1>
        <p class="sub">Quem é você nessa noite?</p>
        <div class="papeis">
          <div class="papel-card mod" id="btn-moderador">
            <h3>Sou Moderador</h3>
            <p class="muted">Controla o jogo (tablet). Pede PIN.</p>
          </div>
          <div class="papel-card guest" id="btn-convidado">
            <h3>Sou Convidado</h3>
            <p class="muted">Entra na sala e pega o buzzer.</p>
          </div>
        </div>
      </div>
    </section>

    <!-- PIN -->
    <section id="s-pin" class="screen">
      <div class="card center" style="margin-top:8vh">
        <h2>PIN do moderador</h2>
        <p class="muted">4 dígitos pra abrir o painel.</p>
        <input id="in-pin" class="pin-input mt" inputmode="numeric" maxlength="4" placeholder="••••" />
        <button id="btn-pin-ok" class="btn primary mt">Entrar</button>
        <button class="btn ghost mt voltar-entrada">Voltar</button>
      </div>
    </section>

    <!-- NOME -->
    <section id="s-nome" class="screen">
      <div class="card center" style="margin-top:8vh">
        <h2>Seu nome</h2>
        <p class="muted">Como você aparece na sala.</p>
        <input id="in-nome" class="mt" list="participantes" placeholder="Seu nome" autocomplete="off" />
        <datalist id="participantes"></datalist>
        <button id="btn-nome-ok" class="btn guest mt">Entrar na festa</button>
        <button class="btn ghost mt voltar-entrada">Voltar</button>
      </div>
    </section>

    <!-- TELAS DOS MÓDULOS (preenchidas via JS) -->
    <section id="s-inicio" class="screen"></section>
    <section id="s-jogos" class="screen">
      <div id="jogos-intro"></div>
      <div id="s-duelo"></div>
      <div id="s-doses"></div>
    </section>
    <section id="s-custos" class="screen"></section>
    <section id="s-local" class="screen"></section>
    <section id="s-config" class="screen"></section>

  </main>

  <nav id="tabbar" class="tabbar hidden"></nav>
  <div id="toast" class="toast"></div>

  <!-- Firebase compat SDK (só é usado se CONFIG.firebase estiver preenchido) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <!-- App (ordem importa) -->
  <script src="js/config.js"></script>
  <script src="js/data/perguntas.js"></script>
  <script src="js/sala.js"></script>
  <script src="js/duelo.js"></script>
  <script src="js/custos.js"></script>
  <script src="js/local.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
